name: Crawl University Contacts

on:
  # Run automatically every Monday at 08:00 UTC
  schedule:
    - cron: "0 8 * * 1"

  # Also allow manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: "Crawl mode"
        required: true
        default: "missing"
        type: choice
        options:
          - missing        # only rows with no contact name yet
          - all            # re-crawl every row
      country:
        description: "Country code filter (optional, e.g. DE)"
        required: false
        default: ""
      priority:
        description: "Priority filter (optional: A, B or C)"
        required: false
        default: ""

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # so the action can commit the updated CSV back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run crawler
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.mode }}" = "all" ]; then
            ARGS="$ARGS --all"
          fi
          if [ -n "${{ github.event.inputs.country }}" ]; then
            ARGS="$ARGS --country ${{ github.event.inputs.country }}"
          fi
          if [ -n "${{ github.event.inputs.priority }}" ]; then
            ARGS="$ARGS --priority ${{ github.event.inputs.priority }}"
          fi
          python crawler.py $ARGS --csv prospects.csv

      - name: Write crawl status
        run: |
          python - << 'PYEOF'
          import json, datetime, csv

          with open("prospects.csv") as f:
              rows = list(csv.DictReader(f))

          has_name  = sum(1 for r in rows if r.get("contact_name","").strip())
          has_email = sum(1 for r in rows if r.get("email","").strip())
          verified  = sum(1 for r in rows if "verified" in r.get("status","").lower())

          status = {
              "last_run": datetime.datetime.utcnow().isoformat() + "Z",
              "total_rows": len(rows),
              "rows_with_name": has_name,
              "rows_with_email": has_email,
              "rows_verified": verified,
              "coverage_pct": round(has_name / len(rows) * 100, 1) if rows else 0,
          }

          with open("crawl_status.json", "w") as f:
              json.dump(status, f, indent=2)

          print("Status written:", status)
          PYEOF

      - name: Commit updated CSV and status
        run: |
          git config user.name  "ABM Crawler Bot"
          git config user.email "crawler@abrilliantmind.blog"
          git add prospects.csv crawl_status.json
          git diff --staged --quiet || git commit -m "crawler: update prospects $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
